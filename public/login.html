<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Authentication</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .auth-panel {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .auth-panel h2 {
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        .auth-switch {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .auth-switch:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div class="auth-panel glass-panel gradient-border" id="login-panel">
            <div class="logo justify-center mb-2" style="justify-content: center; margin-bottom: 20px;">
                <div class="logo-icon">W</div>
                <h1>Welcome</h1>
            </div>
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div id="login-error" class="text-danger" style="margin-bottom: 10px; font-size: 0.85rem;"></div>
                <button type="submit" class="btn btn-primary full-width">Sign In</button>
            </form>
            <button class="auth-switch" onclick="toggleAuthMode()">New here? Create an account.</button>
        </div>

        <!-- Register Form -->
        <div class="auth-panel glass-panel gradient-border hidden" id="register-panel">
            <div class="logo justify-center mb-2" style="justify-content: center; margin-bottom: 20px;">
                <div class="logo-icon">W</div>
                <h1>Welcome</h1>
            </div>
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="form-group" style="text-align: left;">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <div id="reg-error" class="text-danger" style="margin-bottom: 10px; font-size: 0.85rem;"></div>
                <button type="submit" class="btn btn-primary full-width">Sign Up</button>
            </form>
            <button class="auth-switch" onclick="toggleAuthMode()">Already have an account? Sign In.</button>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
